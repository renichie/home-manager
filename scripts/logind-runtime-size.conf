# systemd-logind drop-in: enlarge the per-user XDG_RUNTIME_DIR.
#
# /run/user/$UID is a tmpfs sized by RuntimeDirectorySize (default 10% of RAM,
# ~3.2G on a 32G host). The agent sandbox (scripts/agent-sandbox.sh) places its
# ephemeral scratch /home/user there, so every write under $HOME inside the
# sandbox — pnpm/npm stores, Playwright browser extraction, build caches —
# competes for that space. 10% is too small; 8G gives headroom.
#
# Install:
#   sudo install -Dm644 ~/.config/home-manager/scripts/logind-runtime-size.conf \
#     /etc/systemd/logind.conf.d/10-runtime-size.conf
# Then fully log out and back in (or reboot) so /run/user/$UID is remounted.
[Login]
RuntimeDirectorySize=8G
